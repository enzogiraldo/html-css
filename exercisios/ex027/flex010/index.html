<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>
    <style>
        div.container{
            background-color: rgb(39, 208, 250);

            display: flex;
            flex-flow: row nowrap;
        }
        div.item {
            background-color:  rgb(206, 130, 17);
            border: 1px solid black;
            text-align: center;
            flex-basis: 200px;
            
        }
        div#cxA{
            flex-grow: 0;
            flex-shrink: 1;
        }
        div#cxB {
            flex-grow: 4;
            flex-shrink: 1;
        }
        div#cxC {
            flex-grow: 2;
            flex-shrink: 4;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>

    </div>
</body>
</html>
