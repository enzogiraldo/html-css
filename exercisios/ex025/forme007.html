<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exmplo de formulário</title>
</head>
<body>
    <h1>Exenmplo de Formulário </h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="iest">Estado</label>
            <select name="estados" id="iest">
                <option value="" selected>--escolha--</option>
                <optgroup label="Região Sul">
                    <option value="SP">São Paulo</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="MG">Minas Gerais</option>
                </optgroup>
                <optgroup label="Região Nordeste">
                    <option value="MA">Maranhão</option>
                    <option value="PE">Pernanbuco</option>
                    <option value="RN">Rio Grande do Norte</option>
                </optgroup>
            </select>
        </p>
        <p>
            <label for="iprof">Profisão</label>
            <input type="text" name="profisao" id="iprofisao" list="profi">
            <datalist id="profi">
                <option value="ADM">Adiministração</option>
                <option value="PROF">Professor</option>
                <option value="MED">Médico</option>
                <option value="DEV">Desenvolvedor</option>
                <option value="CONT">Contabilista</option>
            </datalist>
        </p>
        <p>
            <label for="imsg">Mensagem:</label> <br>
            <textarea name="msg" id="img" cols="30" rows="9" placeholder="Deixe sua mensagem aqui"></textarea>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="LImpar">
        </p>
    </form>
</body>
</html>
